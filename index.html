<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Sweetheart 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mali:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #ffb3c6;
            --dark-pink: #ff4d6d;
            --soft-pink: #ffe5ec;
            --text-color: #6c4f57;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Mali', 'Itim', cursive;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffe5ec;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .iphone-screen {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 430px;
            max-height: 932px;
            background: linear-gradient(180deg, #fff0f3 0%, #ffe5ec 50%, #ffccd5 100%);
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(255, 77, 109, 0.15);
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 50px 20px 40px 20px;
            z-index: 2;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* คลาสสลับหน้าแบบวาร์ปพุ่งทะลุจอ */
        .hidden {
            opacity: 0;
            transform: scale(2); 
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            font-size: 20px;
            animation: twinkle 2s infinite ease-in-out;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2) rotate(15deg); }
        }

        /* ==================== หน้าที่ 1 (รับดอกไม้) ==================== */
        .main-title {
            font-size: 2.5rem;
            color: var(--dark-pink);
            text-shadow: 3px 3px 0px #fff;
            text-align: center;
            animation: bounce 2s infinite;
        }

        .gift-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .gift-img {
            width: 100%;
            object-fit: contain;
        }

        .pulse-animation {
            animation: heartBeat 1.5s infinite;
        }

        /* เอฟเฟกต์ตอนกดแล้วจะสั่นรัวๆ ก่อนวาร์ป */
        .shake-animation {
            animation: hardShake 0.5s ease-in-out infinite !important;
        }

        .question-box {
            text-align: center;
            color: var(--text-color);
            font-size: 1.25rem;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 20px;
            border-radius: 20px;
            border: 2px dashed #ffb3c6;
        }

        .btn-pink {
            background: linear-gradient(135deg, #ff758f, #ff4d6d);
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 1.35rem;
            border-radius: 30px;
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
            cursor: pointer;
            font-weight: 600;
        }

        /* ==================== หน้าที่ 2 (แสดงรูปหัวใจเดี่ยว) ==================== */
        .music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.85);
            border: 1.5px solid var(--primary-pink);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--dark-pink);
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
            cursor: pointer;
        }

        .notebook-card {
            background: #fff;
            width: 100%;
            height: 82%;
            margin-top: 15px;
            border-radius: 24px;
            padding: 20px 15px;
            box-shadow: 0 10px 30px rgba(255, 179, 198, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            border-left: 8px dashed var(--primary-pink);
        }

        .letter-text {
            color: var(--text-color);
            font-size: 0.75rem; /* 👈 ลดขนาดตัวอักษรลงมาให้พอดีกับข้อความยาว */
            text-align: center;
            line-height: 1.6;   /* ปรับระยะห่างระหว่างบรรทัดให้ไม่ติดกันเกินไป */
        }

        /* --- โครงสร้างรูปภาพหัวใจเดี่ยว พร้อมแอนิเมชันค่อยๆ โผล่ --- */
        .collage-heart-container {
            position: relative;
            width: 100%;
            max-width: 320px; 
            margin: 10px 0;
            opacity: 0;
            transform: scale(0.6);
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .show-heart {
            opacity: 1;
            transform: scale(1);
        }

        .single-heart-img {
            width: 100%;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
        }

        /* เส้นกะพริบแอนิเมชันพิมพ์ข้อความ */
        .typing-cursor::after {
            content: '|';
            animation: blink 0.8s infinite;
            color: var(--dark-pink);
        }

        .falling-heart {
            position: absolute;
            pointer-events: none;
            animation: drift 4s linear infinite;
            z-index: 1;
        }

        /* ==================== คีย์เฟรมแอนิเมชันทั้งหมด ==================== */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes hardShake {
            0% { transform: translate(3px, 2px) rotate(0deg); }
            10% { transform: translate(-2px, -3px) rotate(-3deg); }
            20% { transform: translate(-4px, 0px) rotate(4deg); }
            30% { transform: translate(0px, 3px) rotate(0deg); }
            40% { transform: translate(2px, -2px) rotate(2deg); }
            50% { transform: translate(-2px, 3px) rotate(-2deg); }
            60% { transform: translate(-4px, 2px) rotate(0deg); }
            70% { transform: translate(3px, 2px) rotate(-3deg); }
            80% { transform: translate(-2px, -2px) rotate(4deg); }
            90% { transform: translate(3px, 3px) rotate(0deg); }
            100% { transform: translate(2px, -3px) rotate(-2deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.08); }
            28% { transform: scale(1); }
            42% { transform: scale(1.08); }
            70% { transform: scale(1); }
        }

        @keyframes drift {
            0% { transform: translateY(105vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-10vh) translateX(50px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="loveMusic" src="music.mp3" loop></audio>

    <div class="iphone-screen">
        
        <div class="sparkle" style="top: 12%; left: 10%;">✨</div>
        <div class="sparkle" style="top: 18%; right: 10%;">🌸</div>
        <div class="sparkle" style="bottom: 8%; left: 12%;">💕</div>

        <div id="page1" class="page">
            <h1 class="main-title">ของขวัญสำหรับเจ้าเด็ก 💐</h1>
            
            <div class="gift-container" onclick="triggerWarp()">
                <img id="giftBox" class="gift-img pulse-animation" src="https://img2.pic.in.th/Pngtreebouquet-of-flowers-lilies_14549672.md.png" alt="Gift">
            </div>

            <div class="question-box">
                จำได้มั้ยน้า...<br>
                <span style="color: var(--dark-pink); font-weight: 600;">เดือนอะไรน้าา?</span><br>
                เจ้าเด็ก พี่มีของจะให้คั้บบ 🧸
            </div>

            <button class="btn-pink" onclick="triggerWarp()">รับดอกไม้ ♥</button>
        </div>

        <div id="page2" class="page hidden">
            <button class="music-toggle" onclick="controlMusic()">
                <span id="m-icon">⏸️</span> <span id="m-text">หยุดเพลง</span>
            </button>

            <div class="notebook-card">
                <p class="letter-text">
                    ให้ของขวัญชิ้นนี้...<br>แทนความรู้สึกดีๆ และกำลังใจจากพี่นะคะ 💖
                </p>

                <div id="heartCollage" class="collage-heart-container">
                    <img class="single-heart-img" src="https://img1.pic.in.th/images/58966ca9e2f41b3f.png" alt="Heart Collage">
                </div>

                <p id="typingText" class="letter-text typing-cursor" style="font-weight: 600; color: var(--text-color); min-height: 55px;"></p>
            </div>

            <button class="btn-pink" style="font-size: 1.1rem; padding: 10px 35px;" onclick="saySomething()">
                อ่านต่อเลย 💖
            </button>
        </div>

    </div>

    <script>
        const loveMusic = document.getElementById('loveMusic');
        const mText = document.getElementById('m-text');
        const mIcon = document.getElementById('m-icon');
        const giftBox = document.getElementById('giftBox');
        const heartCollage = document.getElementById('heartCollage');
        const typingTextElement = document.getElementById('typingText');

        // ข้อความดุ๊กดิ๊กที่จะค่อยๆ พิมพ์ออกมาทีละตัว
        const messageToType = "เจ้าเด็กจ๋าา พี่มีของน่ารักๆมาให้ค่ะ เดือนนี้เดือนอะไรน้าา พี่ตั้งใจทำมากเพื่อหนูเลย พี่รักหนูมากๆที่สุดในโลก ดีใจที่สุดที่ได้มาเจอกัน เราผ่านอะไรมากันเย้อเลย ละก็มีอะไรที่ยังไม่ทำด้วยกันอีกเต็มเลย อยากมาให้กำลังใจหนู ช่วงนี้เห็นหนูเหนื่อยๆ ต้องทำอะไรหลายอย่าง ทั้งไปเรียนพิเศษ อ่านหนังสือ พี่จะคอยซัพพอร์ตหนูเสมอ ช่วงนี้อาจจะเหนื่อยเยอะ แต่หนูจะผ่านมันไปได้ ขอให้สอบทำคะแนนได้เย้อๆ  พี่จะคอยอยู่ข้างๆหนูในทุกๆวัน ง้อหนูทุกๆวัน ถ้าเหนื่อยหันมากอดพี่ได้เสมอ เล่าให้พี่ฟังได้ทุกเรื่อง เลี้ยงหนมบ่อยๆ จาพาหนูไปกินของอร่อยเย้อๆ คนเก่งของพี่ทำได้อยู่แล้ว พี่จะอยู่กับหนูตลอดไปเลยค่ะ ♡";

        function triggerWarp() {
            // 1. สั่งให้ดอกไม้สั่นแรงๆ เป็นลูกเล่นก่อนวาป
            giftBox.classList.remove('pulse-animation');
            giftBox.classList.add('shake-animation');
            
            // 2. ตั้งเวลาสั่น 800 มิลลิวินาที แล้วค่อยพุ่งวาปไปหน้าที่ 2
            setTimeout(() => {
                document.getElementById('page1').classList.add('hidden');
                document.getElementById('page2').classList.remove('hidden');
                
                // รูปหัวใจของคุณค่อยๆ ปรากฏและขยายแบบละมุน
                setTimeout(() => {
                    heartCollage.classList.add('show-heart');
                }, 300);

                // เริ่มเล่นแอนิเมชันพิมพ์อักษรหลังจากรูปโผล่มาแล้ว
                setTimeout(() => {
                    typeWriter(messageToType, 0);
                }, 1200);
                
                // เล่นเพลงอัตโนมัติทันทีเมื่อเข้าหน้า 2
                loveMusic.play().then(() => {
                    mText.innerText = "หยุดเพลง";
                    mIcon.innerText = "⏸️";
                }).catch((err) => {
                    console.log("ระบบป้องกันเปิดเพลงอัตโนมัติของบางบราวเซอร์ทำงาน");
                });

                // สร้างหัวใจลอยฟรุ้งฟริ้งหลังจอ
                setInterval(spawnHeart, 350);
            }, 800);
        }

        // ฟังก์ชันเปิด-ปิดเพลงแบบต่อจากเวลาเดิม (Pause / Resume)
        function controlMusic() {
            if (loveMusic.paused) {
                loveMusic.play();
                mText.innerText = "หยุดเพลง";
                mIcon.innerText = "⏸️";
            } else {
                loveMusic.pause();
                mText.innerText = "เปิดเพลงต่อ";
                mIcon.innerText = "🎵";
            }
        }

        // ระบบตัวพิมพ์อักษรทีละตัว
        function typeWriter(text, i) {
            if (i < text.length) {
                if (text.charAt(i) === '\n') {
                    typingTextElement.innerHTML += '<br>';
                } else {
                    typingTextElement.innerHTML += text.charAt(i);
                }
                setTimeout(() => {
                    typeWriter(text, i + 1);
                }, 90); // ความเร็วในการพิมพ์ (มิลลิวินาที)
            } else {
                // พิมพ์เสร็จแล้วเอาเส้นกะพริบออก
                typingTextElement.classList.remove('typing-cursor');
            }
        }

        function spawnHeart() {
            const screen = document.querySelector('.iphone-screen');
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            
            const cuteIcons = ['💖', '💕', '💗', '🌸', '🧸', '✨'];
            heart.innerText = cuteIcons[Math.floor(Math.random() * cuteIcons.length)];
            
            heart.style.left = Math.random() * 90 + 5 + '%';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 12 + 16 + 'px';
            
            screen.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4500);
        }

        
        function saySomething() {
                        alert("ขอบคุณสำหรับทุกอย่างเลยนะเจ้าเด็กคนพิเศษ พี่จะทำให้หนูเป็นคนโชคดีที่สุดบนโลกเลยย 🧸");
        }
    </script>
</body>
</html>
